name: Figma comment triage

on:
  schedule:
    # UTC-only cron. 14:00 Africa/Cairo is 12:00 UTC in winter (UTC+2) and
    # 11:00 UTC in summer (UTC+3), so we fire at both and let the reporter's
    # local-hour guard pick the right one. Weekdays only.
    - cron: "0 11,12 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Run now, ignoring the 2pm-Cairo / already-ran-today guards"
        type: boolean
        default: false
      lookback_days:
        description: "Scan the last N Cairo days (1 = today only, 2 = today + yesterday). Blank = default (since last run)."
        type: string
        default: ""
      since:
        description: "Start date YYYY-MM-DD (Cairo) or ISO timestamp. Overrides lookback_days. Blank = default."
        type: string
        default: ""
      until:
        description: "End date YYYY-MM-DD (Cairo) or ISO timestamp — whole day included. Blank = now."
        type: string
        default: ""

# Needed to commit state.json + jobs/*.json back to the repo.
permissions:
  contents: write

concurrency:
  group: figma-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run triage
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          # Draws on the Claude subscription — generated with `claude setup-token`.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Bot transport (two-way clarification loop; see worker/README.md).
          # When set, digests post via the bot and clarifications become
          # threadable messages the worker can route back.
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          FORCE_RUN: ${{ inputs.force && '1' || '' }}
          # Ad-hoc date-range selection (blank on scheduled runs → default 24h).
          TRIAGE_LOOKBACK_DAYS: ${{ inputs.lookback_days }}
          TRIAGE_SINCE: ${{ inputs.since }}
          TRIAGE_UNTIL: ${{ inputs.until }}
        run: npm run triage

      - name: Commit state + jobs
        run: |
          git config user.name "figma-triage-bot"
          git config user.email "bot@users.noreply.github.com"
          git add reporter/state.json jobs/ clarifications/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "triage: $(date -u +%Y-%m-%d) run"
            # A clarification commit from the worker may have landed mid-run.
            git pull --rebase
            git push
          fi
